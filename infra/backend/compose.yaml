services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/healthz/', headers={'X-Forwarded-Proto':'https'}); urllib.request.urlopen(req, timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    container_name: gathondu-caddy
    image: caddy:2.9-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - certbot-webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt:ro
      - caddy-data:/data
      - caddy-config:/config

  certbot:
    image: certbot/certbot:v5.6.0
    volumes:
      - certbot-webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

volumes:
  caddy-config:
  caddy-data:
  certbot-webroot:
  letsencrypt:
  postgres-data:
